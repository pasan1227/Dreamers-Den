<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ehsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B85C2B" stop-opacity="0.5"/>
      <stop offset="0.4" stop-color="#D9D2BF"/>
      <stop offset="1" stop-color="#F8F4E9"/>
    </linearGradient>
    <filter id="ehmist">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#ehsky)"/>
  <!-- distant lowlands -->
  <path d="M0 460 L240 420 L500 450 L760 410 L1020 440 L1200 420 L1200 600 L0 600 Z" fill="#7C8773" opacity="0.55"/>
  <path d="M0 540 L260 500 L520 530 L820 490 L1100 520 L1200 510 L1200 700 L0 700 Z" fill="#5B6B4F" opacity="0.7"/>
  <!-- cliff edge -->
  <path d="M0 540 L500 540 L520 600 L0 700 Z" fill="#3D4F40"/>
  <path d="M0 700 L520 600 L520 900 L0 900 Z" fill="#1F2D24"/>
  <path d="M520 600 L540 580 L560 900 L520 900 Z" fill="#14201A"/>
  <!-- mist below -->
  <g filter="url(#ehmist)" opacity="0.7">
    <ellipse cx="900" cy="700" rx="500" ry="40" fill="#F2EDE0"/>
    <ellipse cx="1100" cy="750" rx="400" ry="30" fill="#F2EDE0"/>
  </g>
  <!-- distant figure -->
  <g transform="translate(380 480)" fill="#1A1A1A">
    <ellipse cx="0" cy="0" rx="10" ry="8"/>
    <path d="M-6 6 L-10 50 L10 50 L6 6 Z"/>
  </g>
</svg>
