<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g4bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B6B4F"/>
      <stop offset="0.6" stop-color="#3D4F40"/>
      <stop offset="1" stop-color="#9B7A4A"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#g4bg)"/>
  <!-- distant trees -->
  <g fill="#1F2D24" opacity="0.7">
    <path d="M0 380 L200 320 L400 360 L600 300 L800 340 L1000 310 L1200 350 L1400 320 L1600 360 L1600 600 L0 600 Z"/>
  </g>
  <!-- table top -->
  <rect x="0" y="540" width="1600" height="60" fill="#6E5430"/>
  <rect x="0" y="600" width="1600" height="300" fill="#9B7A4A"/>
  <g stroke="#6E5430" stroke-width="2" opacity="0.5">
    <line x1="0" y1="660" x2="1600" y2="660"/>
    <line x1="0" y1="720" x2="1600" y2="720"/>
    <line x1="0" y1="780" x2="1600" y2="780"/>
    <line x1="0" y1="840" x2="1600" y2="840"/>
  </g>
  <!-- hopper -->
  <g transform="translate(220 470)">
    <ellipse cx="100" cy="80" rx="100" ry="20" fill="#F2EDE0"/>
    <path d="M0 80 Q100 0 200 80 Z" fill="#F8F4E9"/>
    <ellipse cx="100" cy="40" rx="40" ry="14" fill="#B85C2B"/>
  </g>
  <!-- curry bowl -->
  <g transform="translate(560 510)">
    <ellipse cx="80" cy="40" rx="80" ry="30" fill="#1A1A1A"/>
    <ellipse cx="80" cy="32" rx="74" ry="22" fill="#B85C2B"/>
    <ellipse cx="80" cy="30" rx="60" ry="14" fill="#9B5821"/>
  </g>
  <!-- tea pot -->
  <g transform="translate(820 460)">
    <ellipse cx="80" cy="100" rx="80" ry="22" fill="#1A1A1A"/>
    <path d="M0 100 Q0 30 80 25 Q160 30 160 100 Z" fill="#F2EDE0"/>
    <path d="M160 60 Q200 50 200 70 Q200 90 170 90" fill="none" stroke="#F2EDE0" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="80" cy="20" rx="30" ry="8" fill="#9B7A4A"/>
    <rect x="74" y="6" width="12" height="14" fill="#9B7A4A"/>
  </g>
  <!-- small cup -->
  <g transform="translate(1100 540)">
    <ellipse cx="50" cy="40" rx="50" ry="12" fill="#1A1A1A"/>
    <path d="M0 40 Q0 0 50 0 Q100 0 100 40 Z" fill="#F2EDE0"/>
    <ellipse cx="50" cy="6" rx="40" ry="6" fill="#9B5821"/>
  </g>
  <!-- bread -->
  <g transform="translate(1280 530)">
    <ellipse cx="80" cy="40" rx="80" ry="20" fill="#9B7A4A"/>
    <ellipse cx="80" cy="36" rx="76" ry="14" fill="#B85C2B" opacity="0.7"/>
  </g>
</svg>
