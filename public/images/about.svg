<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3D4F40"/>
      <stop offset="0.5" stop-color="#5B6B4F"/>
      <stop offset="1" stop-color="#1F2D24"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9B7A4A"/>
      <stop offset="1" stop-color="#6E5430"/>
    </linearGradient>
    <radialGradient id="warmth" cx="0.5" cy="0.6" r="0.35">
      <stop offset="0" stop-color="#B85C2B" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#B85C2B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="1500" fill="url(#bg)"/>
  <!-- trees -->
  <g fill="#14201A" opacity="0.8">
    <path d="M120 0 L160 0 L150 800 L130 800 Z"/>
    <path d="M80 200 Q140 140 160 220 Q200 180 230 260 Q180 280 140 270 Q90 290 80 230 Z"/>
    <path d="M1020 0 L1060 0 L1050 900 L1030 900 Z"/>
    <path d="M980 300 Q1040 240 1080 320 Q1130 280 1150 360 Q1100 380 1050 360 Q1000 380 980 320 Z"/>
  </g>
  <!-- cabin -->
  <g transform="translate(280 700)">
    <!-- roof -->
    <path d="M-40 80 L320 80 L280 -10 L0 -10 Z" fill="#1A1A1A"/>
    <path d="M-40 80 L320 80 L320 100 L-40 100 Z" fill="#14201A"/>
    <!-- body -->
    <rect x="0" y="100" width="640" height="380" fill="url(#wood)"/>
    <!-- planks -->
    <g stroke="#6E5430" stroke-width="2" opacity="0.6">
      <line x1="0" y1="160" x2="640" y2="160"/>
      <line x1="0" y1="220" x2="640" y2="220"/>
      <line x1="0" y1="280" x2="640" y2="280"/>
      <line x1="0" y1="340" x2="640" y2="340"/>
      <line x1="0" y1="400" x2="640" y2="400"/>
      <line x1="0" y1="460" x2="640" y2="460"/>
    </g>
    <!-- window glow -->
    <rect x="60" y="180" width="120" height="180" fill="#F2EDE0" opacity="0.85"/>
    <rect x="60" y="180" width="120" height="180" fill="#B85C2B" opacity="0.45"/>
    <rect x="118" y="180" width="4" height="180" fill="#1A1A1A" opacity="0.6"/>
    <rect x="60" y="268" width="120" height="4" fill="#1A1A1A" opacity="0.6"/>
    <!-- door -->
    <rect x="260" y="200" width="120" height="280" fill="#14201A"/>
    <rect x="270" y="220" width="100" height="120" fill="#F2EDE0" opacity="0.7"/>
    <circle cx="365" cy="350" r="3" fill="#9B7A4A"/>
    <!-- right window -->
    <rect x="460" y="180" width="120" height="180" fill="#F2EDE0" opacity="0.85"/>
    <rect x="460" y="180" width="120" height="180" fill="#B85C2B" opacity="0.4"/>
    <rect x="518" y="180" width="4" height="180" fill="#1A1A1A" opacity="0.6"/>
    <rect x="460" y="268" width="120" height="4" fill="#1A1A1A" opacity="0.6"/>
  </g>
  <rect width="1200" height="1500" fill="url(#warmth)"/>
  <!-- foreground grass -->
  <path d="M0 1380 Q300 1320 600 1370 Q900 1310 1200 1380 L1200 1500 L0 1500 Z" fill="#14201A"/>
</svg>
